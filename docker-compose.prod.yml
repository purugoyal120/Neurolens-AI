version: '3.8'

services:
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    image: neurolens-backend:prod
    restart: always
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=sqlite:///./data/neurolens.db
      - SECRET_KEY=${SECRET_KEY:-"09d25e094faa6ca2556c818166b7a9563b93f7099f6f0f4caa6cf63b88e8d3e7"}
    volumes:
      - neurolens_db_data:/app/data
    depends_on:
      - redis

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  neurolens_db_data:
  redis_data:
